<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Pohon Inovasi BPOM - Interactive Hover</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div id="guideOverlay" class="guide-overlay">
			<div class="guide-content">
				<div style="font-size: 50px; margin-bottom: 15px">👆</div>
				<h2 style="margin: 0; font-size: 2rem">Pohon Inovasi</h2>
				<p style="opacity: 0.8; font-size: 1.1rem">
					Klik buahnya untuk memetik informasi
				</p>
				<button class="guide-btn" onclick="App.closeGuide()">Mulai</button>
			</div>
		</div>

		<div id="leafLayer"></div>

		<div class="header-container">
			<h1>Pohon Inovasi</h1>
			<h2>Balai POM di Kota Lubuklinggau</h2>
			<div class="tagline">"Berakar pada Masalah, Berbuah pada Solusi"</div>
		</div>
		
		<div id="treeContainer" class="tree-wrapper">
			<div id="treeInner" class="tree-inner">
				<img
					src="assets/pohon/pohon-inovasi_ful_opa.png"
					alt="Pohon Inovasi"
					class="tree-img"
				/>
				<!-- Buah akan dirender di sini oleh JavaScript -->
			</div>
		</div>

		<div class="footer-container">
			<div class="copyright-text">
				&copy; 2026 Balai POM di Kota Lubuklinggau. All Rights Reserved.
			</div>
		</div>

		<div id="mainModal" class="modal-backdrop">
			<div class="modal-card">
				<div class="gallery-section">
					<div class="gallery-stage">
						<div class="gallery-track" id="galleryTrack"></div>
						<button
							class="slider-btn prev-btn"
							id="btnPrev"
							onclick="App.slide(-1)"
						>
							&#10094;
						</button>
						<button
							class="slider-btn next-btn"
							id="btnNext"
							onclick="App.slide(1)"
						>
							&#10095;
						</button>
					</div>
					<div class="thumbnail-strip" id="thumbnailStrip"></div>
				</div>
				<div class="info-section">
					<div class="info-header">
						<div class="info-title">
							<span class="info-label">Inovasi</span>
							<h3 id="modalTitle">Judul</h3>
						</div>
						<button class="btn-close-modal" onclick="App.closeModal()">
							&times;
						</button>
					</div>
					<div class="info-body">
						<div id="modalDesc"></div>
					</div>
				</div>
			</div>
		</div>
		<script src="data_inovasi.js"></script>
		<script>
			/* ENGINE */
			const App = {
				config: { centerX: 50, centerY: 35, radX: 38, radY: 28, buffer: 12 },
				state: { usedPositions: [], slideIdx: 0, totalSlides: 0 },

				init() {
					this.renderTree();
					this.startLeaves();
					document
						.getElementById("mainModal")
						.addEventListener("click", (e) => {
							if (e.target.id === "mainModal") this.closeModal();
						});
				},

				renderTree() {
					// Ubah target ke 'treeInner' agar koordinat persen sesuai dengan area gambar
					const container = document.getElementById("treeInner"); 
					Object.keys(DATA_INOVASI).forEach((key) => {
						const pos = this.getPos();
						if (!pos) return;
						const el = document.createElement("div");
						el.className = "fruit-item";
						el.textContent = key;
						el.style.left = pos.l + "%";
						el.style.top = pos.t + "%";
						
						el.style.animationDelay = `0s, -${(Math.random() * 3).toFixed(2)}s`;
						el.onclick = () => this.openModal(key);
						container.appendChild(el);
					});
				},

				getPos() {
					let valid = false,
						t,
						l,
						i = 0;
					while (!valid && i < 100) {
						const a = Math.random() * Math.PI * 2,
							r = Math.sqrt(Math.random());
						l = this.config.centerX + r * this.config.radX * Math.cos(a);
						t = this.config.centerY + r * this.config.radY * Math.sin(a);
						if (!this.checkCol(t, l)) valid = true;
						i++;
					}
					return valid
						? (this.state.usedPositions.push({ t, l }), { t, l })
						: null;
				},

				checkCol(t, l) {
					return this.state.usedPositions.some(
						(p) =>
							Math.abs(p.l - l) < this.config.buffer &&
							Math.abs(p.t - t) < this.config.buffer,
					);
				},

				openModal(key) {
					const d = DATA_INOVASI[key];
					document.getElementById("modalTitle").textContent = d.judul;
					document.getElementById("modalDesc").innerHTML = d.deskripsi;
					this.renderGallery(d.images, d.judul);

					const m = document.getElementById("mainModal");
					m.style.display = "flex";
					requestAnimationFrame(() => m.classList.add("active"));
				},

				closeModal() {
					const m = document.getElementById("mainModal");
					m.classList.remove("active");
					setTimeout(() => (m.style.display = "none"), 300);
				},

				closeGuide() {
					const g = document.getElementById("guideOverlay");
					g.style.opacity = 0;
					setTimeout(() => (g.style.display = "none"), 500);
				},

				renderGallery(images, title) {
					this.state.totalSlides = images.length;
					this.state.slideIdx = 0;
					const track = document.getElementById("galleryTrack");
					const strip = document.getElementById("thumbnailStrip");
					const pBtn = document.getElementById("btnPrev");
					const nBtn = document.getElementById("btnNext");

					track.innerHTML = "";
					strip.innerHTML = "";
					track.style.transform = "translateX(0)";

					if (images.length === 0) {
						track.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:white;flex-direction:column;"><span style="font-size:40px;opacity:0.5">📷</span><p>Tidak ada foto</p></div>`;
						pBtn.style.display = "none";
						nBtn.style.display = "none";
						return;
					}

					images.forEach((src, i) => {
						const slide = document.createElement("div");
						slide.className = "gallery-slide";
						slide.innerHTML = `<img src="${src}" alt="${title} ${i + 1}">`;
						track.appendChild(slide);

						const thumb = document.createElement("img");
						thumb.className = `thumb ${i === 0 ? "active" : ""}`;
						thumb.src = src;
						thumb.onclick = () => this.goToSlide(i);
						strip.appendChild(thumb);
					});

					const show = images.length > 1 ? "flex" : "none";
					pBtn.style.display = show;
					nBtn.style.display = show;
				},

				slide(dir) {
					let next = this.state.slideIdx + dir;
					if (next < 0) next = this.state.totalSlides - 1;
					if (next >= this.state.totalSlides) next = 0;
					this.goToSlide(next);
				},

				goToSlide(idx) {
					this.state.slideIdx = idx;
					document.getElementById("galleryTrack").style.transform =
						`translateX(-${idx * 100}%)`;
					document.querySelectorAll(".thumb").forEach((t, i) => {
						if (i === idx) {
							t.classList.add("active");
							t.scrollIntoView({ behavior: "smooth", inline: "center" });
						} else t.classList.remove("active");
					});
				},

				startLeaves() {
					setInterval(() => {
						if (document.hidden) return;
						const l = document.createElement("div");
						l.className = "leaf";
						l.style.left = Math.random() * 100 + "vw";
						l.style.setProperty("--endX", Math.random() * 100 - 50 + "px");
						l.style.animationDuration = Math.random() * 5 + 5 + "s";
						document.getElementById("leafLayer").appendChild(l);
						setTimeout(() => l.remove(), 10000);
					}, 800);
				},
			};

			window.onload = () => App.init();
		</script>
	</body>
</html>
